<svg width="1024" height="1024" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo y Borde (size-8 = 32px, bg-accent, border-accent-foreground/20, rounded-lg) -->
  <rect x="0" y="0" width="32" height="32" rx="8" fill="#261E1A" stroke="#F06529" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Contenido SVG centrado en la caja de 32x32. 
       El SVG original es de 16x16. Lo trasladamos a (8, 8) para que quede en el medio exacto.
       Esto da un padding interno de 8px en todos los lados. -->
  <g transform="translate(8, 8)">
    <circle cx="4" cy="4" r="2" fill="#F06529"></circle>
    <circle cx="12" cy="4" r="2" fill="#F06529" fill-opacity="0.7"></circle>
    <circle cx="8" cy="12" r="2" fill="#F06529" fill-opacity="0.5"></circle>
    <line x1="5.5" y1="5" x2="7" y2="10.5" stroke="#F06529" stroke-width="1" stroke-opacity="0.4"></line>
    <line x1="10.5" y1="5" x2="9" y2="10.5" stroke="#F06529" stroke-width="1" stroke-opacity="0.4"></line>
  </g>
</svg>
